name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build Next.js and Docker image
    runs-on: ubuntu-latest

    env:
      MONGO: ${{ secrets.MONGO }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
      GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}

    steps:
      - name: Hämta repository
        uses: actions/checkout@v4

      - name: Installera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installera dependencies
        run: npm ci

      - name: Bygg Next.js
        run: npm run build

      - name: Bygg Docker image
        run: docker build -t bygglov-bokning .