name: Build and push Docker image to Azure Container Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Hämta kod
        uses: actions/checkout@v4

      - name: Logga in i Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Bygg Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/bygglov-bokning:${{ github.sha }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/bygglov-bokning:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/bygglov-bokning:latest

      - name: Pusha Docker image till ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/bygglov-bokning:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/bygglov-bokning:latest