name: Build and deploy Node.js app to Azure Web App - Bygglov-MVP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MONGO: ${{ secrets.MONGO }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: https://bygglov-mvp-a0dyd3geh9fbfvf7.swedencentral-01.azurewebsites.net
      GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
      GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Installera dependencies
        run: npm ci

      - name: Bygg Next.js standalone
        run: npm run build

      - name: Förbered standalone-deployment
        run: |
          cp -r public .next/standalone/public || true
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_09B37C585C3347339C2FBBD012290B4E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5FE932BAA5914B5A8C8E7BCF15912C32 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C2D21BB1E8AF4A7AAE78F13499EA032D }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "Bygglov-MVP"
          slot-name: "Production"
          package: .